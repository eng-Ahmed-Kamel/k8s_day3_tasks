# ============================================================
# LAB 3 - Part 1: DNS
# ============================================================

# --- Step a & b: Namespace + Deployment (2 replicas, port 80) ---

apiVersion: v1
kind: Namespace
metadata:
  name: iti46

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: iti46
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

---

# --- Step c: NodePort Service on port 5000 ---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: iti46
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 5000         # Service port (ClusterIP port)
      targetPort: 80     # Container port
      protocol: TCP

---

# --- Step e: Test Pod (default namespace, has curl) ---

apiVersion: v1
kind: Pod
metadata:
  name: curl-test
  namespace: default
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ["sleep", "3600"]   # Keep pod alive for testing
  restartPolicy: Never
